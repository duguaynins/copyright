<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nins/DOSJS</title>

<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        cursor: text;
    }

    #terminal {
        color: #00ff00;
        font-family: 'Courier New', Courier, monospace;
        padding: 20px;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        font-size: 18px;
        line-height: 1.2;
    }

    #output-container {
        flex: 1;
        overflow-y: auto;
        scrollbar-width: none;
    }
    #output-container::-webkit-scrollbar { display: none; }

    .line {
        display: flex;
        align-items: center;
        min-height: 1.2em;
    }

    .prompt {
        margin-right: 10px;
        white-space: nowrap;
    }

    /* 隱藏原生輸入，使用虛擬光標 */
    #hidden-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        left: -9999px;
    }

    #display-text {
        white-space: pre-wrap;
        word-break: break-all;
    }

    #cursor {
        display: inline-block;
        width: 10px;
        height: 1.1em;
        background: #00ff00;
        vertical-align: middle;
        margin-left: 2px;
    }

    .blink {
        animation: blink-animation 0.8s steps(2, start) infinite;
    }

    @keyframes blink-animation {
        to { visibility: hidden; }
    }

    .menu {
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 1px solid #004400;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    button {
        background: black;
        border: 1px solid #00ff00;
        color: #00ff00;
        font-family: inherit;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 14px;
        text-transform: uppercase;
    }

    button:hover { background: #003300; }
    
    /* 編輯模式按鈕樣式 */
    .edit-btn { border-color: #ffff00; color: #ffff00; }
    .edit-btn:hover { background: #333300; }

    .info { color: #ffff00; }
    .success { color: #88ff88; }
    .error { color: #ff5555; }
    .table { display: grid; grid-template-columns: 220px 120px; margin: 2px 0; }
</style>
</head>

<body onclick="focusInput()">

<div id="terminal">
    <!-- 按鈕控制區 -->
    <div class="menu">
        <button onclick="quickCmd('DIR')">DIR</button>
        <button onclick="startEdit('APP.JS')">EDIT APP.JS</button>
        <button id="btn-save" class="edit-btn" style="display:none;" onclick="handleSave()">:SAVE</button>
        <button id="btn-exit" class="edit-btn" style="display:none;" onclick="handleExit()">:EXIT</button>
        <button onclick="quickCmd('RUN APP.JS')">RUN APP.JS</button>
        <button onclick="quickCmd('CLS')">CLS</button>
        <div style="flex:1"></div>
        <button onclick="navigateHistory(-1)">↑</button>
        <button onclick="navigateHistory(1)">↓</button>
    </div>

    <div id="output-container">
        <div id="output">
            <div>Ready. Type <b style="color:white">HELP</b> for commands.</div>
        </div>
    </div>

    <div class="line">
        <span id="prompt-tag" class="prompt">C:\&gt;</span>
        <span id="display-text"></span><span id="cursor" class="blink"></span>
    </div>
    
    <input type="text" id="hidden-input" autofocus spellcheck="false" autocomplete="off">
</div>

<script>
    const hiddenInput = document.getElementById("hidden-input");
    const displayText = document.getElementById("display-text");
    const output = document.getElementById("output");
    const container = document.getElementById("output-container");
    const promptTag = document.getElementById("prompt-tag");
    const btnSave = document.getElementById("btn-save");
    const btnExit = document.getElementById("btn-exit");

    let vfs = {
        "APP.JS": "console.log('Hello World!');"
    };
    let history = [];
    let historyIndex = -1;
    
    // 編輯模式狀態
    let isEditing = false;
    let editFileName = "";
    let editBuffer = [];

    // 輸入同步
    hiddenInput.addEventListener("input", () => {
        displayText.textContent = hiddenInput.value;
        scrollBottom();
    });

    hiddenInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const val = hiddenInput.value;
            if (isEditing) {
                processEditLine(val);
            } else {
                if (val.trim() !== "") {
                    print(promptTag.innerText + " " + val);
                    history.push(val);
                    historyIndex = history.length;
                    processCommand(val);
                } else {
                    print(promptTag.innerText);
                }
            }
            hiddenInput.value = "";
            displayText.textContent = "";
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            navigateHistory(-1);
        } else if (e.key === "ArrowDown") {
            e.preventDefault();
            navigateHistory(1);
        }
    });

    function focusInput() { hiddenInput.focus(); }

    function print(text, isHTML = true) {
        const div = document.createElement("div");
        if (isHTML) div.innerHTML = text;
        else div.textContent = text;
        output.appendChild(div);
        scrollBottom();
    }

    function scrollBottom() {
        container.scrollTop = container.scrollHeight;
    }

    // 指令處理
    function processCommand(raw) {
        const parts = raw.trim().split(/\s+/);
        const cmd = parts[0].toUpperCase();

        switch (cmd) {
            case "HELP":
                print("DIR          - List files");
                print("EDIT [FILE]  - Start editor");
                print("RUN [FILE]   - Execute JS file");
                print("CLS          - Clear screen");
                break;
            case "CLS":
                output.innerHTML = "";
                break;
            case "DIR":
                print(" Directory of C:\\<br>");
                for (let name in vfs) {
                    print(`<div class="table"><span>${name.padEnd(15)}</span><span>${vfs[name].length} bytes</span></div>`);
                }
                break;
            case "EDIT":
                if (parts[1]) startEdit(parts[1].toUpperCase());
                else print("Usage: EDIT [FILENAME]");
                break;
            case "RUN":
                const target = parts[1] ? parts[1].toUpperCase() : null;
                if (target && vfs[target]) {
                    try {
                        print("<span class='info'>Running " + target + "...</span>");
                        const res = window.eval(vfs[target]);
                        if (res !== undefined) print("<span class='success'>Return: " + res + "</span>");
                    } catch (err) {
                        print("<span class='error'>Error: " + err.message + "</span>");
                    }
                } else print("File not found.");
                break;
            default:
                if (raw.trim() !== "") {
                    try {
                        const res = window.eval(raw);
                        if (res !== undefined) print(res);
                    } catch(e) { print("Bad command or file name"); }
                }
        }
    }

    // --- 編輯模式邏輯 ---
    function startEdit(filename) {
        isEditing = true;
        editFileName = filename;
        editBuffer = [];
        promptTag.innerText = "EDIT>";
        btnSave.style.display = "inline-block";
        btnExit.style.display = "inline-block";
        print(`<span class='info'>Editor: Writing to ${filename}.</span>`);
        print(`<span class='info'>Type code line by line. Type :SAVE to finish.</span>`);
    }

    function processEditLine(line) {
        const cmd = line.trim().toUpperCase();
        if (cmd === ":SAVE") {
            handleSave();
        } else if (cmd === ":EXIT") {
            handleExit();
        } else {
            editBuffer.push(line);
            print("  " + line, false);
        }
    }

    function handleSave() {
        if (!isEditing) return;
        vfs[editFileName] = editBuffer.join("\n");
        print("<span class='success'>File saved successfully.</span>");
        exitEditor();
    }

    function handleExit() {
        if (!isEditing) return;
        print("<span class='error'>Editor closed without saving.</span>");
        exitEditor();
    }

    function exitEditor() {
        isEditing = false;
        editFileName = "";
        editBuffer = [];
        promptTag.innerText = "C:\\>";
        btnSave.style.display = "none";
        btnExit.style.display = "none";
        focusInput();
    }

    // --- 輔助功能 ---
    function navigateHistory(dir) {
        if (isEditing) return;
        historyIndex = Math.max(0, Math.min(history.length, historyIndex + dir));
        hiddenInput.value = history[historyIndex] || "";
        displayText.textContent = hiddenInput.value;
        focusInput();
    }

    function quickCmd(c) {
        if (isEditing) return;
        hiddenInput.value = c;
        const e = new KeyboardEvent('keydown', {'key': 'Enter'});
        hiddenInput.dispatchEvent(e);
    }

    console.log = function(...args) {
        print(args.join(" "), false);
    };

    window.onload = focusInput;
</script>

</body>
</html>
