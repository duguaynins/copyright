      gap: 1rem;
      padding: 1rem;

<script>
  ///20260412

  // 1. 定義 JSON 資料
  const features = [
    {
      type: "notice",
      title: "⚠️ Notice ⚠️",
      desc: "By using any of the services, it means you have agreed to any content and all content!",
      subDesc: "👻👻👻 © 2024 NINS (by JPGT). 👻👻👻",

    },
    {

    },
    {

      tags: ["🔥", "BETA"],
      action: () => openApp('encoding')
    },
    {
      title: "🔓 nins/decoding 🔓",
      desc: "Use the camera to decode a 2D code.",
      tags: ["🔥", "BETA"],
      action: () => openApp('decoding')
    },
    {
      title: "🧭 nins/uris 🧭",
      desc: "Quickly create your own contact URL in HTTPS. Give a \"Vivre Card/Soul Paper\" to everything that matters!",
      subDesc: "Feel free to apply! no sensitive info needed.",
      tags: ["🎄", "⭐"],
      action: () => openApp('uris')
    },
    {
      title: "🧿 nins/deurl 🧿",
      desc: "Check a link’s destination here first, and don’t walk straight through the door into trouble.",
      subDesc: "Feel free to apply! no sensitive info needed.",
      tags: ["👻", "⭐"],
      action: () => openApp('deurl')
    },
    {
      title: "🔣 nins/transing 🔣",
      desc: "Use chat channels to easily start communicating with anyone.",
      subDesc: "Feel free to apply! no sensitive info needed.",
      tags: ["👻", "⭐"],
      action: () => openApp('transing')
    },
    {
      title: "🖥️ nins/sys 🖥️",
      desc: "DOS system. All the everyday little tools are in this old system.",
      tags: ["👻", "⭐"],
      action: () => openApp('x')
    },
    {
      title: "📜 nins/feedback 📜",
      desc: "Interested in our latest app releases? We will send you a push notification. We’d love any brief feedback!",
      action: () => openFollow()
    },
    {
      type: "admin",
      title: "⚠️ Admins ⚠️",
      desc: "public co-founder.",
      subDesc: "👻👻👻 © 2024 NINS (by JPGT). 👻👻👻",
      style: "background:#444444; color:white;",
      action: () => window.open('https://sites.google.com/view/duguaynins/', '_blank')
    }
  ];

  // 1. 建立延遲工具函式 (毫秒)
  const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  // 2. 修改後的渲染函式 (改為 async)
  async function renderFeatures() {
    const container = document.getElementById('feature-container');
    const delay = 220; // ⬅️ 這裡設定每個項目之間要間隔幾毫秒 (例如 1000ms = 1秒)

    for (const item of features) {
      const div = document.createElement('div');
      div.className = 'feature-item';
      if (item.style) div.style.cssText = item.style;
      
      // 處理點擊事件
      if (item.action) {
        div.onclick = item.action;
      }

      // 處理標籤 (如 🔥 BETA)
      let tagsHtml = '';
      if (item.tags) {
        tagsHtml = `
          <div style="position: absolute; top: 0; left: 0; background: orange; color: black; padding: 2px 6px; font-size: 0.8em; font-weight: bold;">${item.tags[0]}</div>
          <div style="position: absolute; top: 0; right: 0; background: orange; color: black; padding: 2px 6px; font-size: 0.8em; font-weight: bold;">${item.tags[1]}</div>
        `;
      }

      // 組合內部 HTML
      div.innerHTML = `
        ${tagsHtml}
        <h2 translate="no">${item.title}</h2>
        <p style="${item.type ? 'margin-bottom: 0; color: #999;' : ''}">${item.desc}</p>
        ${item.subDesc ? `<p style="margin-top: 0; color: orange;" translate="${item.type === 'admin' ? 'no' : 'yes'}">${item.subDesc}</p>` : ''}
      `;

      // 3. 加入到容器中
      container.appendChild(div);

      // 4. 自動滾動到這個新元素
      div.scrollIntoView({ 
        behavior: 'smooth', 
        block: 'end'  ///center, end
      });

      // 5. ⬅️ 關鍵：等待一段時間後再跑下一次迴圈
      await sleep(delay);
    }

function urlBase64ToUint8Array(base64String) {
  // 補齊 Base64 長度
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/\-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64); // Base64 解碼
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }

  return outputArray;
}

  }
  return result;
}
