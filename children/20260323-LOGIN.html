<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nins/LOGIN</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Courier New", monospace;
    }

    body {
      margin: 0;
      background: #000;
      color: #00ff66;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .dos-window {
      width: 100%;
      max-width: 700px;
      border: 2px solid #00ff66;
      padding: 20px;
      box-shadow: 0 0 20px #00ff66;
      background: #000;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      text-transform: uppercase;
      border-bottom: 1px solid #00ff66;
      padding-bottom: 10px;
    }

    .line {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      width: 100px;
      flex-shrink: 0;
    }

    input {
      flex: 1;
      background: #000;
      border: 1px solid #00ff66;
      color: #00ff66;
      padding: 10px;
      outline: none;
      font-size: 16px;

      width: 0;
    }
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 1000px #000 inset !important;
      -webkit-text-fill-color: #00ff66 !important;
      border: 1px solid #00ff66 !important;
      caret-color: #00ff66 !important;
      transition: background-color 9999s ease-in-out 0s;
    }

    input:focus {
      box-shadow: 0 0 10px #00ff66;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ff66;
      margin-left: 4px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .btn-row {
      margin-top: 20px;
      display: flex;
      gap: 12px;
    }

    button {
      background: #000;
      color: #00ff66;
      border: 1px solid #00ff66;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 16px;
      text-transform: uppercase;
    }

    button:hover {
      background: #00ff66;
      color: #000;
    }

    .output {
      margin-top: 25px;
      border-top: 1px dashed #00ff66;
      padding-top: 15px;
      white-space: pre-line;
      min-height: 80px;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="dos-window">
    <div class="title">DOS USER FORM</div>

    <form id="dosForm">
      <div class="line">
        <label for="name">NAME></label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="line">
        <label for="email">EMAIL></label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="line">
        <label for="age">AGE></label>
        <input type="number" id="age" name="age" required />
      </div>

      <div class="btn-row">
        <label for="age">CTRL></label>
        <button type="submit">SUBMIT</button>
        <button type="reset">CLEAR</button>
      </div>
    </form>

    <div class="hint">SYSTEM READY<span class="cursor"></span></div>

    <div class="output" id="output">
      [WAITING FOR INPUT...]
    </div>
  </div>

  <script>
    const form = document.getElementById("dosForm");
    const output = document.getElementById("output");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const age = document.getElementById("age").value.trim();
      output.textContent +=
`[DATA START]

NAME  : ${name}
EMAIL : ${email}
AGE   : ${age}

[DATA END]\n`;
    });
      ///output.textContent += `\n[DATA RECEIVED]`;

    form.addEventListener("reset", function () {
      setTimeout(() => {
        output.textContent = "[WAITING FOR INPUT...]";
      }, 0);
    });
  </script>
</body>
</html>
