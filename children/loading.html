<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<title>nins/loading</title>
<style>
/* 全螢幕置中 */
body, html {
  height: 100%;
  margin: 0;
  display: flex;           /* Flexbox 置中 */
  justify-content: center; /* 水平置中 */
  align-items: center;     /* 垂直置中 */
  background-color: #f0f0f0;
  font-family: monospace;
  font-size: 3rem;
}

#spinner {
  color: #333;
}
</style>
</head>
<body>

<span id="spinner">/</span>

<script>
const spinner = ['/', '-', '\\', '|'];  ///, '\\', '-', '/'
let i = 0;
setInterval(() => {
    document.getElementById('spinner').textContent = spinner[i % spinner.length];
    i++;
}, 200);
</script>

<script>
async function subscribePush() {
  const reg = await navigator.serviceWorker.ready

  const subscription = await reg.pushManager.subscribe({
    userVisibleOnly: true,
    applicationServerKey: urlBase64ToUint8Array("BMTkSZCTzXmsrdL2g1C_mMAoB6WTCsLTMJqo3PBFeLX5DuVQ2RSX0iM3wKR-LSjjY1A6stHYsTWOVVl9LnoCEig")
  })

  console.log(subscription.toJSON()); console.log(JSON.stringify(subscription));
  return;
  
  // 將 subscription 傳到後端
  await fetch("/subscribe", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(subscription)
  })
}
subscribePush();

function urlBase64ToUint8Array(base64String) {
  // 補齊 Base64 長度
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/\-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64); // Base64 解碼
  const outputArray = new Uint8Array(rawData.length);

  for (let i = 0; i < rawData.length; ++i) {
    outputArray[i] = rawData.charCodeAt(i);
  }

  return outputArray;
}
</script>

</body>
</html>
