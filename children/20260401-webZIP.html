<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>純原生 ZIP 下載</title>
</head>
<body>
  <h2>上傳檔案後下載 ZIP（無套件）</h2>

  <input type="file" id="fileInput" />
  <button id="downloadBtn">下載 ZIP</button>

  <p id="msg"></p>

  <script>
    const fileInput = document.getElementById("fileInput");
    const downloadBtn = document.getElementById("downloadBtn");
    const msg = document.getElementById("msg");

    // ===== CRC32 =====
    function makeCRCTable() {
      let c;
      const crcTable = [];
      for (let n = 0; n < 256; n++) {
        c = n;
        for (let k = 0; k < 8; k++) {
          c = ((c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1));
        }
        crcTable[n] = c >>> 0;
      }
      return crcTable;
    }

    const crcTable = makeCRCTable();

    function crc32(data) {
      let crc = 0 ^ (-1);
      for (let i = 0; i < data.length; i++) {
        crc = (crc >>> 8) ^ crcTable[(crc ^ data[i]) & 0xFF];
      }
      return (crc ^ (-1)) >>> 0;
    }

    // ===== 小工具 =====
    function strToUint8(str) {
      return new TextEncoder().encode(str);
    }

    function writeUint16LE(arr, offset, value) {
      arr[offset] = value & 0xff;
      arr[offset + 1] = (value >>> 8) & 0xff;
    }

    function writeUint32LE(arr, offset, value) {
      arr[offset] = value & 0xff;
      arr[offset + 1] = (value >>> 8) & 0xff;
      arr[offset + 2] = (value >>> 16) & 0xff;
      arr[offset + 3] = (value >>> 24) & 0xff;
    }

    function concatUint8Arrays(arrays) {
      let totalLength = arrays.reduce((sum, arr) => sum + arr.length, 0);
      let result = new Uint8Array(totalLength);
      let offset = 0;
      for (const arr of arrays) {
        result.set(arr, offset);
        offset += arr.length;
      }
      return result;
    }

    // ===== 建立最小 ZIP（Stored / 不壓縮）=====
    function createZip(fileName, fileData) {
      const fileNameBytes = strToUint8(fileName);
      const crc = crc32(fileData);
      const compressedSize = fileData.length;
      const uncompressedSize = fileData.length;

      // Local File Header
      const localHeader = new Uint8Array(30 + fileNameBytes.length);
      writeUint32LE(localHeader, 0, 0x04034b50); // signature
      writeUint16LE(localHeader, 4, 20); // version needed
      writeUint16LE(localHeader, 6, 0); // general purpose bit flag
      writeUint16LE(localHeader, 8, 0); // compression method = 0 (stored)
      writeUint16LE(localHeader, 10, 0); // mod time
      writeUint16LE(localHeader, 12, 0); // mod date
      writeUint32LE(localHeader, 14, crc);
      writeUint32LE(localHeader, 18, compressedSize);
      writeUint32LE(localHeader, 22, uncompressedSize);
      writeUint16LE(localHeader, 26, fileNameBytes.length);
      writeUint16LE(localHeader, 28, 0); // extra field length
      localHeader.set(fileNameBytes, 30);

      const localHeaderOffset = 0;

      // Central Directory Header
      const centralHeader = new Uint8Array(46 + fileNameBytes.length);
      writeUint32LE(centralHeader, 0, 0x02014b50); // signature
      writeUint16LE(centralHeader, 4, 20); // version made by
      writeUint16LE(centralHeader, 6, 20); // version needed
      writeUint16LE(centralHeader, 8, 0); // general purpose bit flag
      writeUint16LE(centralHeader, 10, 0); // compression method
      writeUint16LE(centralHeader, 12, 0); // mod time
      writeUint16LE(centralHeader, 14, 0); // mod date
      writeUint32LE(centralHeader, 16, crc);
      writeUint32LE(centralHeader, 20, compressedSize);
      writeUint32LE(centralHeader, 24, uncompressedSize);
      writeUint16LE(centralHeader, 28, fileNameBytes.length);
      writeUint16LE(centralHeader, 30, 0); // extra field length
      writeUint16LE(centralHeader, 32, 0); // file comment length
      writeUint16LE(centralHeader, 34, 0); // disk number start
      writeUint16LE(centralHeader, 36, 0); // internal file attrs
      writeUint32LE(centralHeader, 38, 0); // external file attrs
      writeUint32LE(centralHeader, 42, localHeaderOffset);
      centralHeader.set(fileNameBytes, 46);

      const centralDirOffset = localHeader.length + fileData.length;
      const centralDirSize = centralHeader.length;

      // End of Central Directory
      const endRecord = new Uint8Array(22);
      writeUint32LE(endRecord, 0, 0x06054b50); // signature
      writeUint16LE(endRecord, 4, 0); // disk number
      writeUint16LE(endRecord, 6, 0); // start disk number
      writeUint16LE(endRecord, 8, 1); // total entries on this disk
      writeUint16LE(endRecord, 10, 1); // total entries
      writeUint32LE(endRecord, 12, centralDirSize);
      writeUint32LE(endRecord, 16, centralDirOffset);
      writeUint16LE(endRecord, 20, 0); // comment length

      return new Blob(
        [concatUint8Arrays([localHeader, fileData, centralHeader, endRecord])],
        { type: "application/zip" }
      );
    }

    downloadBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];

      if (!file) {
        msg.textContent = "請先選擇檔案";
        return;
      }

      msg.textContent = "正在建立 ZIP...";

      try {
        const arrayBuffer = await file.arrayBuffer();
        const fileData = new Uint8Array(arrayBuffer);

        const zipBlob = createZip(file.name, fileData);

        const zipName = file.name.includes(".")
          ? file.name.substring(0, file.name.lastIndexOf(".")) + ".zip"
          : file.name + ".zip";

        const a = document.createElement("a");
        a.href = URL.createObjectURL(zipBlob);
        a.download = zipName;
        a.click();

        msg.textContent = "ZIP 下載完成";
      } catch (err) {
        console.error(err);
        msg.textContent = "建立 ZIP 失敗";
      }
    });
  </script>
</body>
</html>
